[tool.bumpversion]
current_version = "1.6.1"
parse = "(?P<major>\\d+)\\.(?P<minor>\\d+)\\.(?P<patch>\\d+)(-(?P<snapshot>SNAPSHOT))?"
serialize = [
    "{major}.{minor}.{patch}-{snapshot}",
    "{major}.{minor}.{patch}"
]
search = "{current_version}"
replace = "{new_version}"
regex = false
ignore_missing_version = false
ignore_missing_files = false
tag = true
sign_tags = false
tag_name = "v{new_version}"
tag_message = "Bump version: {current_version} → {new_version}"
allow_dirty = false
commit = true
message = "Bump version: {current_version} → {new_version}"
commit_args = ""

[tool.bumpversion.parts.snapshot]
values = ["SNAPSHOT", ""]
optional_value = ""

[[tool.bumpversion.files]]
filename = "cross_field_highlighter/version.txt"
